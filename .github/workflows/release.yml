name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # allows manual runs from the Actions tab to test builds

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            jq cmake \
            libexpat1-dev libfontconfig-dev libfreetype-dev \
            libxkbcommon-dev pkgconf

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: deb-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: deb-${{ runner.os }}-

      - name: Build .deb
        run: bash build-deb.sh

      - uses: actions/upload-artifact@v4
        with:
          name: deb
          path: "*.deb"

  build-flatpak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "value=${{ github.ref_name }}" | sed 's/^value=v/value=/' >> "$GITHUB_OUTPUT"
          else
            echo "value=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache vendor directory
        uses: actions/cache@v4
        with:
          path: vendor
          key: vendor-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb flatpak flatpak-builder

      - name: Add Flathub remote
        run: sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Generate vendored dependencies
        run: mkdir -p .cargo && cargo vendor > .cargo/config.toml

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: clippy-land_${{ steps.version.outputs.value }}.flatpak
          manifest-path: io.github.k33wee.clippy-land.json
          cache-key: flatpak-${{ hashFiles('**/Cargo.lock') }}
          run-tests: false
          extra-args: --disable-sandbox

      - uses: actions/upload-artifact@v4
        with:
          name: flatpak
          path: clippy-land.flatpak

  release:
    needs: [build-deb, build-flatpak]
    runs-on: ubuntu-latest
    # only publish when triggered by a tag push, not manual runs
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            deb/*.deb
            flatpak/*.flatpak
          generate_release_notes: true
